version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
    environment:
      - BUNDLE_PATH=/usr/local/bundle
    command: bash -c "bundle install && bundle exec rails db:prepare && bundle exec rails tailwindcss:build && bundle exec rails server -b 0.0.0.0"

volumes:
  bundle:
